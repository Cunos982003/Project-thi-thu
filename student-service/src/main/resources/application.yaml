server:
  port: 8081

spring:
  application:
    name: student-service

  datasource:
    url: jdbc:postgresql://localhost:5432/student_db
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: true
    instance-id: ${spring.cloud.client.hostname}:${spring.application.name}:${server.port}

logging:
  level:
    com.microservices.student: INFO
    org.hibernate.SQL: DEBUG